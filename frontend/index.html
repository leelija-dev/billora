<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Company-Based Multi-Tenant SaaS ERP System - Complete business management solution" />
    <meta name="keywords" content="ERP, SaaS, Business Management, Inventory, Orders, Invoicing" />
    <meta name="author" content="Your Company" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="SaaS ERP - Business Management System" />
    <meta property="og:description" content="Complete ERP solution for modern businesses" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SaaS ERP - Business Management System" />
    <meta name="twitter:description" content="Complete ERP solution for modern businesses" />
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SaaS ERP" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Title -->
    <title>SaaS ERP - Multi-Tenant Business Management System</title>
    
    <!-- Preconnect to API domain -->
    <link rel="preconnect" href="http://localhost:8000" />
    <link rel="dns-prefetch" href="http://localhost:8000" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Loading script for better UX -->
    <script>
      // Add loading indicator while React boots up
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div style="
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          ">
            <div style="text-align: center;">
              <div style="
                width: 50px;
                height: 50px;
                border: 3px solid #ffffff;
                border-top-color: transparent;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
              "></div>
              <div style="color: white; font-family: system-ui, sans-serif;">
                Loading SaaS ERP...
              </div>
            </div>
          </div>
          <style>
            @keyframes spin {
              to { transform: rotate(360deg); }
            }
          </style>
        `;
      }
    </script>
  </body>
</html>
